<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Evgeniy — Designer & Developer</title>
    <meta
        name="description"
        content="Portfolio of Evgeniy, designer and developer."
    >
    <meta name="author" content="Evgeniy Aleksandrovich Nekrasov">
    <meta name="robots" content="index, follow">

    <meta name="theme-color" content="#ffffff">
    <meta name="color-scheme" content="light dark">

    <style>
        * { box-sizing: border-box }
        html, body { min-height: 100%; }
        body {
            margin: 0;
            font-family: sans-serif;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        main {
            width: min(100%, 80ch);
            height: 100%;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .page { display: none; }
        .page.activa { display: block; }
    </style>
</head>

<body>
    <main>
        <header>
            <span>ean</span>
            <nav>
                <a href="#/home" data-ruta="/home">Home</a>
                <a href="#/bio" data-ruta="/bio">Bio</a>
            </nav>
        </header>
        <section id="home" class="page">
            <h1>EVGENIY</h2>
            <span>
                Front end developer and designer
            </span>
            <span>TODO: add info</span>
        </section>
        <section id="bio" class="page">
            <h2>bio</h2>
            <span>TODO: add bio</span>
        </section>
        <section id="not-found" class="page">
            <span>not found</span>
        </section>
    </main>

    <script>
        const rutas = {
            "/home": "home",
            "/bio": "bio"
        }

        function obtenerRuta() {
            return window.location.hash.replace("#", "") || "/home";
        }

        function renderizarRuta() {
            const rutaActual = obtenerRuta();
            const paginaId = rutas[rutaActual] || "not-found";

            document.querySelectorAll(".page").forEach(page => {
                page.classList.remove("activa");
            });

            document.getElementById(paginaId).classList.add("activa");

            document.querySelectorAll("nav a").forEach(enlace => {
                enlace.classList.toggle("activo", enlace.dataset.ruta === rutaActual)
            });

            const titulos = {
                "/home": "Home | My personal page",
                "/bio": "Bio | My perosnal page"
            };

            document.title = titulos[rutaActual] || "404";
        }

        window.addEventListener("hashchange", renderizarRuta);
        window.addEventListener("DOMContentLoaded", renderizarRuta);
    </script>
</body>
</html>
